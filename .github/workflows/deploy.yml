name: Deploy CV

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run code checks
        run: pnpm run codecheck

      - name: Build for GitHub Pages
        run: pnpm run build
        env:
          GITHUB_PAGES: 'true'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Build for VPS
        run: pnpm run build

      - name: Upload VPS artifact
        uses: actions/upload-artifact@v4
        with:
          name: vps-dist
          path: dist

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-vps:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VPS build
        uses: actions/download-artifact@v4
        with:
          name: vps-dist
          path: dist

      - name: Copy static site to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: dist/*
          target: /var/www/cv
          strip_components: 1
          overwrite: true

      # Deploy the contact relay outside the nginx web root so its code (and
      # the .env it reads) is never served as a static file. The VPS-side .env
      # is created once by hand and is not in the repo, so it's preserved here.
      - name: Copy contact relay to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: server/*
          target: /var/www/cv-server
          strip_components: 1
          overwrite: true

      - name: Restart contact relay
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/cv-server
            pm2 startOrRestart ecosystem.config.cjs --update-env
            pm2 save
