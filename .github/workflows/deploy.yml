name: Deploy CV

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Don't overlap deploys to the VPS; let an in-progress one finish.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version comes from the "packageManager" field in package.json — don't
      # also pin it here, or action-setup errors on the version mismatch.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run code checks
        run: pnpm run codecheck

      - name: Build for VPS
        run: pnpm run build

      - name: Upload VPS artifact
        uses: actions/upload-artifact@v4
        with:
          name: vps-dist
          path: dist

  deploy-vps:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VPS build
        uses: actions/download-artifact@v4
        with:
          name: vps-dist
          path: dist

      - name: Copy static site to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: dist/*
          target: /var/www/cv
          strip_components: 1
          overwrite: true

      # Deploy the contact relay outside the nginx web root so its code (and
      # the .env it reads) is never served as a static file. The VPS-side .env
      # is created once by hand and is not in the repo, so it's preserved here.
      - name: Copy contact relay to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: server/*
          target: /var/www/cv-server
          strip_components: 1
          overwrite: true

      - name: Restart contact relay
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            # Non-interactive SSH skips the login profile, so PATH may lack
            # node/pm2 (typical with nvm). Load nvm and common global bins.
            export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="$PATH:/usr/local/bin:/usr/bin:$HOME/.npm-global/bin:$HOME/.local/bin"
            cd /var/www/cv-server
            pm2 startOrRestart ecosystem.config.cjs --update-env
            pm2 save
